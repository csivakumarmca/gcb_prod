<!--
  Author: Sivakumar Chandrahasu | Created: 2026-07-07 | Updated: 2026-07-07
  Purpose: Common OAuth callback and lightweight router for GCB pages.
           Restores the originally requested direct page after login/MFA completes.
           Used mainly by Client App for ChatMonitor and as fallback for direct pages.
-->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genesys Context Bridge (GCB)</title>
  <script>
    (function () {
      try {
        var p = new URLSearchParams(window.location.search || "");
        var targetPage = (p.get("page") || p.get("module") || "").trim();
        if (targetPage) document.documentElement.classList.add("gcb-router-mode");
      } catch (_) {}
    })();
  </script>
  <style>
    body { margin: 0; padding: 10px; font-family: Arial, Helvetica, sans-serif; background: #f4f6f8; color: #001b3d; font-size: 12px; }
    .gcb-card { max-width: 760px; margin: 10px auto; background: #fff; border: 1px solid #cfd9e3; border-radius: 10px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .gcb-title { font-size: 16px; font-weight: 700; color: #004982; margin-bottom: 8px; }
    .gcb-status { white-space: pre-wrap; line-height: 1.35; padding: 8px; border-radius: 6px; background: #e8f1ff; color: #0b4b88; word-break: break-word; margin-bottom: 10px; }
    .gcb-success { background: #e7f7e7; color: #146c2e; }
    .gcb-warning { background: #fff4d8; color: #8a5200; }
    .gcb-error { background: #fde7e7; color: #9b0000; }
    .status-table { width: 100%; border-collapse: collapse; margin-top: 4px; font-size: 12px; }
    .status-table td { padding: 7px 6px; border-bottom: 1px solid #e6edf5; vertical-align: top; }
    .status-table td:first-child { width: 130px; font-weight: 700; color: #34495e; }
    .status-ok { color: #146c2e; font-weight: 700; }
    .status-fail { color: #9b0000; font-weight: 700; }
    .status-pending { color: #7a5200; font-weight: 700; }
    .gcb-toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .gcb-btn { border: 1px solid #b8c5d6; background: #fff; color: #003b70; border-radius: 5px; padding: 5px 9px; font-size: 11px; cursor: pointer; }
    .gcb-btn:hover { background: #eef5ff; }
    .gcb-debug-log { display: none; background: #071727; color: #dbeafe; border-radius: 6px; padding: 10px; max-height: 240px; overflow: auto; font-family: Consolas, "Courier New", monospace; font-size: 11px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; margin-top: 8px; }
    .gcb-debug-log.show { display: block; }
    .meta { display: grid; grid-template-columns: 90px 1fr; gap: 4px 8px; margin-top: 8px; color: #405263; font-size: 11px; }
    .meta b { color: #001b3d; }

    .gcb-simple-header { max-width: 760px; margin: 10px auto 0; background: #fff; border: 1px solid #d7e2ee; border-radius: 8px; padding: 7px 10px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: flex-start; gap: 8px; }
    .gcb-simple-logo { width: 24px; height: 24px; border-radius: 7px; background: #fff; display: grid; place-items: center; box-shadow: 0 1px 4px rgba(0,0,0,.10); overflow: hidden; flex: 0 0 auto; }
    .gcb-simple-logo img { width: 19px; height: 19px; object-fit: contain; }
    .gcb-simple-title { font-size: 13px; font-weight: 800; color: #004982; line-height: 1.15; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    html.gcb-router-mode body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
    html.gcb-router-mode .gcb-card, html.gcb-router-mode .gcb-simple-header { display: none !important; }
    .gcb-router-compact { display: none; }
    html.gcb-router-mode .gcb-router-compact {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 11px;
      color: #52616f;
      background: transparent;
      padding: 2px 6px;
    }
    html.gcb-router-mode .gcb-router-compact span { opacity: 0.75; }
    .status-table td { vertical-align: top; }
    .status-table td:first-child { width: 82px; min-width: 82px; }
    .status-table td:last-child, #gcbMeta div { min-width: 0; overflow-wrap: anywhere; word-break: break-word; line-height: 1.25; }
    #lineLastApi, #lineLastError { font-size: 11px; }
  </style>
</head>

      <button class="gcb-btn" id="copyLogsBtn" type="button">Copy details</button>
      <button class="gcb-btn" id="downloadLogsBtn" type="button">Download details</button>
      <button class="gcb-btn" id="clearLogsBtn" type="button">Clear</button>
    </div>
    <div id="centralDebugLog" class="gcb-debug-log">No logs yet.</div>
  </div>

  <script src="./js/gcb-debug.js"></script>
  <script src="./js/gcb-common.js"></script>
  <script src="./js/gcb-auth.js"></script>
  <script src="./js/genesys-api.js"></script>
  <script>
    (function () {
      "use strict";

      const ROUTER_VERSION = "v1.7.2.75-account-list-source-fix";
      const C = window.RakCommon;
      const Auth = window.RakAuth;
      const Api = window.GenesysApi;
      const GCB_ACTIVE_HOLDS_KEY = "GCB_ACTIVE_HOLDS_V1";
      const GCB_HOLD_CHANNEL = "GCB_HOLD_MONITOR";
      const GCB_INTERACTION_CONTEXTS_KEY = "AFT_GCB_INTERACTION_CONTEXTS_V1";
      const INDEX_PARAMS = new URLSearchParams(window.location.search || "");
      const CURRENT_CONVERSATION_ID = C.safeString(INDEX_PARAMS.get("conversationId") || INDEX_PARAMS.get("gcConversationId") || "");
      let interactionSupportContext = {
        loaded: false,
        conversationStatus: "Not available",
        customerSessionId: "",
        agentParticipantId: "",
        agentCommunicationId: "",
        communicationState: "Not available",
        participantConfigSummary: "Not available"
      };

      const REQUIRED_GCB_ATTRIBUTES = [
        "AFT_GCB_HoldMessageText","AFT_GCB_ResumeMessageText","AFT_GCB_MaxHoldAttempts","AFT_GCB_MaxHoldTimeSeconds",
        "AFT_GCB_AutoResumeEnabled","AFT_GCB_CustomerBasedHoldCalculation","AFT_GCB_AlertBlinkEnabled",
        "AFT_GCB_AlertBlinkDurationMs","AFT_GCB_AlertSoundEnabled","AFT_GCB_AlertSoundRepeatCount",
        "AFT_GCB_AlertSoundDurationMs","AFT_GCB_AlertSoundGapMs","AFT_GCB_BrowserNotificationEnabled",
        "AFT_GCB_TaskbarBlinkEnabled","AFT_GCB_TitleBlinkDurationMs","AFT_GCB_NotificationAutoCloseMs",
        "AFT_GCB_HoldMaxTimeAlertText","AFT_GCB_HoldMaxAttemptsAlertText","AFT_GCB_HoldAlertTitle",
        "AFT_GCB_AutoResumeSentText","AFT_GCB_ProspectsTypeDataTableId",
        "AFT_GCB_ProspectsMappingDataTableId","AFT_GCB_InteractionOutcomeMultiSelect","AFT_GCB_ContactReasonSeparator",
        "AFT_GCB_WrapupNameSeparator","AFT_GCB_CreateWrapupIfMissing","AFT_GCB_DisconnectAfterProspectsSubmit","AFT_GCB_SupportRoles","AFT_GCB_AdminRoles",
        "AFT_GCB_SupervisorKeywordDefault","AFT_GCB_AgentJoinedText_EN","AFT_GCB_AgentJoinedText_AR",
        "AFT_GCB_SupervisorJoinedText_EN","AFT_GCB_SupervisorJoinedText_AR","AFT_GCB_GreetingText_EN","AFT_GCB_GreetingText_AR",
        "AFT_GCB_GreetingTextWithoutSubject_EN","AFT_GCB_GreetingTextWithoutSubject_AR",
        "AFT_GCB_SendGreetingForSupervisor","AFT_GCB_TransferGreetingText_EN","AFT_GCB_TransferGreetingText_AR",
        "AFT_GCB_TransferGreetingTextWithoutSubject_EN","AFT_GCB_TransferGreetingTextWithoutSubject_AR"
      ];
      let centralHoldMonitorStarted = false;
      let centralHoldMonitorBusy = false;

      const MODULE_MAP = {
        "chatmonitor": "chatmonitor.html",
        "chat-monitor": "chatmonitor.html",
        "monitor": "chatmonitor.html",
        "conversation-monitor": "chatmonitor.html",
        "hold-resume": "holdresume.html",
        "holdresume": "holdresume.html",
        "hold": "holdresume.html",
        "holdtimer": "holdtimer.html",
        "hold-timer": "holdtimer.html",
        "timer": "holdtimer.html",
        "prospects": "prospects.html",
        "prospect": "prospects.html"
      };

      function $(id) { return document.getElementById(id); }

      function isRouterMode() {
        return document.documentElement.classList.contains("gcb-router-mode");
      }

      function setStatus(message, type) {
        const compact = $("routerCompact");
        if (compact && isRouterMode()) compact.textContent = message || "Opening GCB page...";
        const el = $("gcbStatus");
        if (!el) return;
        el.textContent = message || "";
        el.className = "gcb-status" + (type ? " gcb-" + type : "");
      }

      function mask(value) {
        const text = C.safeString(value);
        if (!text) return "Not provided";
        if (text.length <= 8) return "********";
        return text.substring(0, 4) + "..." + text.substring(text.length - 4);
      }

      function debugLog(level, step, message, data) {
        try { if (window.GcbDebug) window.GcbDebug.log(level, step, message, data); } catch (_) {}
      }

      function readCentralHoldRecords() {
        try {
          const raw = localStorage.getItem(GCB_ACTIVE_HOLDS_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
        } catch (_) {
          return {};
        }
      }

      function writeCentralHoldRecords(records) {
        try { localStorage.setItem(GCB_ACTIVE_HOLDS_KEY, JSON.stringify(records || {})); } catch (_) {}
      }

      function broadcastCentralHoldEvent(type, record) {
        try {
          if (typeof BroadcastChannel !== "undefined") {
            const channel = new BroadcastChannel(GCB_HOLD_CHANNEL);
            channel.postMessage({ type: type, record: record || null, time: new Date().toISOString() });
            channel.close();
          }
        } catch (_) {}
      }

      function isHoldDue(record, nowMs) {
        if (!record || record.status !== "HOLD" || record.resumeSent) return false;
        const maxSeconds = Number(record.maxHoldTime || 0);
        const startedAt = Number(record.holdStartTimeMs || 0);
        if (!maxSeconds || !startedAt) return false;
        return (nowMs - startedAt) >= (maxSeconds * 1000);
      }

      function isHoldPageActivelyHandling(record, nowMs) {
        if (!record) return false;
        if (record.activePageVisible !== true) return false;
        const heartbeat = Number(record.activePageHeartbeatMs || 0);
        if (!heartbeat) return false;
        return (nowMs - heartbeat) <= 5000;
      }

      function isStaleHoldRecord(record, nowMs) {
        const startedAt = Number(record && record.holdStartTimeMs || 0);
        return startedAt && (nowMs - startedAt) > (4 * 60 * 60 * 1000);
      }


      function notifyHoldExceededOnce(record) {
        try {
          if (!("Notification" in window) || Notification.permission !== "granted") return;
          const key = "GCB_HOLD_ALERT_SENT_" + C.safeString(record && record.key || "").replace(/[^a-zA-Z0-9_.:-]+/g, "_");
          if (localStorage.getItem(key)) return;
          localStorage.setItem(key, new Date().toISOString());
          const n = new Notification("SIVAKUMAR - RAKBANK", {
            body: "Maximum hold duration reached. Please click Resume to continue the chat.",
            tag: key,
            requireInteraction: false
          });
          setTimeout(function () { try { n.close(); } catch (_) {} }, 12000);
        } catch (_) {}
      }

      async function sendAutoResumeForRecord(record) {
        const token = Auth.getAccessToken();
        if (!token) throw new Error("OAuth token missing for central auto-resume.");
        if (!record.conversationId) throw new Error("conversationId missing in hold record.");
        if (!record.agentCommunicationId) throw new Error("agentCommunicationId missing in hold record.");
        if (!record.resumeMessageText) throw new Error("resumeMessageText missing in hold record.");
        await Api.sendMessage(token, record.conversationId, record.agentCommunicationId, record.resumeMessageText);
      }

      async function processCentralHoldMonitor(reason) {
        if (centralHoldMonitorBusy) return;
        centralHoldMonitorBusy = true;
        const nowMs = Date.now();
        try {
          const records = readCentralHoldRecords();
          let changed = false;
          const keys = Object.keys(records);

          for (const key of keys) {
            const record = records[key];

            // v1.7.2.20: this index page belongs to one Genesys conversation.
            // Do not show or process old hold records from another chat, otherwise a new chat
            // can incorrectly display "Maximum hold duration reached" from a previous interaction.
            if (CURRENT_CONVERSATION_ID && C.safeString(record && record.conversationId) !== CURRENT_CONVERSATION_ID) {
              continue;
            }

            if (isStaleHoldRecord(record, nowMs)) {
              delete records[key];
              changed = true;
              continue;
            }

            if (!isHoldDue(record, nowMs)) continue;

            if (record.autoResumeEnabled === false || String(record.autoResumeEnabled).toLowerCase() === "false") {
              record.status = "HOLD_EXCEEDED";
              record.resumeSent = false;
              record.holdExceededTimeUtc = new Date().toISOString();
              record.reason = reason || "CENTRAL_MONITOR_MAX_HOLD_TIME_MANUAL_RESUME";
              records[key] = record;
              writeCentralHoldRecords(records);
              broadcastCentralHoldEvent("HOLD_EXCEEDED", record);
              notifyHoldExceededOnce(record);
              if (window.GcbDebug) window.GcbDebug.setStatus("holdResume", "failed", "Maximum hold duration reached. Manual Resume required.");
              debugLog("INFO", "CENTRAL_HOLD_EXCEEDED", "key=" + key + " | conversationId=" + C.safeString(record.conversationId));
              changed = true;
              continue;
            }

            if (isHoldPageActivelyHandling(record, nowMs)) {
              debugLog("INFO", "CENTRAL_AUTO_RESUME_SKIP_ACTIVE_PAGE", "key=" + key + " | hold page is active; local hold page timer will handle auto-resume.");
              continue;
            }

            record.status = "RESUME_IN_PROGRESS";
            record.resumeSent = true;
            record.resumeAttemptTimeUtc = new Date().toISOString();
            record.resumeAttemptReason = reason || "CENTRAL_MONITOR_DUE";
            records[key] = record;
            writeCentralHoldRecords(records);
            broadcastCentralHoldEvent("RESUME_IN_PROGRESS", record);
            debugLog("INFO", "CENTRAL_AUTO_RESUME_START", "key=" + key + " | conversationId=" + C.safeString(record.conversationId));

            try {
              await sendAutoResumeForRecord(record);
              record.status = "RESUMED_AUTO";
              record.resumeTimeUtc = new Date().toISOString();
              record.reason = "CENTRAL_MONITOR_MAX_HOLD_TIME";
              records[key] = record;
              writeCentralHoldRecords(records);
              broadcastCentralHoldEvent("RESUMED_AUTO", record);
              if (window.GcbDebug) window.GcbDebug.setStatus("holdResume", "success", "Auto resume sent by central monitor.");
              debugLog("INFO", "CENTRAL_AUTO_RESUME_OK", "key=" + key + " | conversationId=" + C.safeString(record.conversationId));
              changed = true;
            } catch (error) {
              record.status = "HOLD";
              record.resumeSent = false;
              record.lastError = error && error.message ? error.message : String(error);
              record.lastErrorTimeUtc = new Date().toISOString();
              records[key] = record;
              writeCentralHoldRecords(records);
              broadcastCentralHoldEvent("AUTO_RESUME_FAILED", record);
              if (window.GcbDebug) window.GcbDebug.setStatus("holdResume", "failed", "Central auto-resume failed: " + record.lastError);
              debugLog("ERROR", "CENTRAL_AUTO_RESUME_FAILED", "key=" + key + " | " + record.lastError);
              changed = true;
            }
          }

          if (changed) renderCentralLogs();
        } finally {
          centralHoldMonitorBusy = false;
        }
      }

      function startCentralHoldMonitor() {
        if (centralHoldMonitorStarted) return;
        centralHoldMonitorStarted = true;
        debugLog("INFO", "CENTRAL_HOLD_MONITOR_START", "Local hold monitor active. No Genesys polling; auto-resume is controlled by autoResumeEnabled.");
        processCentralHoldMonitor("STARTUP");
        setInterval(function () { processCentralHoldMonitor("INTERVAL"); }, 2000);
        window.addEventListener("storage", function (event) {
          if (event && event.key === GCB_ACTIVE_HOLDS_KEY) processCentralHoldMonitor("STORAGE");
        });
        try {
          if (typeof BroadcastChannel !== "undefined") {
            const channel = new BroadcastChannel(GCB_HOLD_CHANNEL);
            channel.onmessage = function () { processCentralHoldMonitor("BROADCAST"); };
          }
        } catch (_) {}
      }

      function validateCurrentUrl() {
        const href = window.location.href;
        const issues = [];
        if (/%20\+%22|\+%20%22|\+\s*%22|%22\s*\+/i.test(href)) issues.push("URL contains script concatenation text like + quotes. Use the final evaluated URL variable only.");
        if (/https\/\//i.test(href)) issues.push("URL contains https// instead of https://.");
        if (/=https?:\/\//i.test(href) && !href.startsWith("http")) issues.push("URL appears to start with a variable assignment instead of a real URL.");
        if (href.includes("index.html%20")) issues.push("URL has encoded spaces after index.html.");
        return issues;
      }

      function statusClass(state) {
        const s = C.safeString(state).toLowerCase();
        if (s === "success") return "status-ok";
        if (s === "failed") return "status-fail";
        return "status-pending";
      }

      function statusText(status, defaultText) {
        if (!status || !status.state) return defaultText || "Not run";
        const state = status.state === "success" ? "Success" : status.state === "failed" ? "Failed" : "Pending";
        return state + (status.reason ? " - " + status.reason : "");
      }

      function setLine(id, status, defaultText) {
        const el = $(id);
        if (!el) return;
        const cls = statusClass(status && status.state);
        el.innerHTML = '<span class="' + cls + '">' + C.escapeHtml(statusText(status, defaultText)) + '</span>';
      }



      const GCB_RUNTIME_CONFIG_KEY = "AFT_GCB_RUNTIME_CONFIG_V1";

      function publishRuntimeConfiguration() {
        try {
          const params = new URLSearchParams(window.location.search || "");
          const previous = JSON.parse(localStorage.getItem(GCB_RUNTIME_CONFIG_KEY) || "{}");
          const next = {
            langTag: C.safeString(params.get("langTag") || previous.langTag),
            gcTargetEnv: C.safeString(params.get("gcTargetEnv") || previous.gcTargetEnv),
            gcHostOrigin: C.safeString(params.get("gcHostOrigin") || previous.gcHostOrigin),
            usePopupAuth: C.safeString(params.get("usePopupAuth") || previous.usePopupAuth),
            clientId: C.safeString(params.get("clientId") || previous.clientId),
            region: C.safeString(params.get("region") || previous.region),
            source: C.safeString(params.get("source") || previous.source || "AgentScript"),
            updatedAt: new Date().toISOString(),
            publishedBy: "index.html"
          };
          const required = ["clientId", "region", "gcTargetEnv", "gcHostOrigin"];
          const missing = required.filter(function(name){ return !next[name]; });
          localStorage.setItem(GCB_RUNTIME_CONFIG_KEY, JSON.stringify(next));
          debugLog(
            missing.length ? "WARN" : "INFO",
            "INDEX_RUNTIME_CONFIG_PUBLISHED",
            "missing=" + (missing.join(",") || "none") +
            " | region=" + (next.region || "") +
            " | targetEnv=" + (next.gcTargetEnv || "")
          );
          return next;
        } catch (error) {
          debugLog("WARN", "INDEX_RUNTIME_CONFIG_PUBLISH_FAILED", error && error.message ? error.message : String(error));
          return null;
        }
      }

      function getRuntimeParameters() {
        const params = new URLSearchParams(window.location.search || "");
        return {
          conversationId: C.safeString(params.get("conversationId") || params.get("gcConversationId")),
          agentParticipantId: C.safeString(params.get("agentParticipantId")),
          agentCommunicationId: C.safeString(params.get("agentCommunicationId")),
          customerParticipantId: C.safeString(params.get("customerParticipantId")),
          customerCommunicationId: C.safeString(params.get("customerCommunicationId"))
        };
      }

      function getRecentHealth() {
        const events = window.GcbDebug ? window.GcbDebug.getEvents() : [];
        let lastApi = null;
        let lastError = null;
        for (let i = events.length - 1; i >= 0; i -= 1) {
          const event = events[i] || {};
          if (!lastApi && ["FETCH_DONE", "FETCH_FAILED"].includes(C.safeString(event.step).toUpperCase())) lastApi = event;
          if (!lastError && (C.safeString(event.level).toUpperCase() === "ERROR" || /FAILED|ERROR/.test(C.safeString(event.step).toUpperCase()))) lastError = event;
          if (lastApi && lastError) break;
        }
        return { lastApi, lastError };
      }

      function setPlainStatusLine(id, text, cssClass) {
        const el = $(id);
        if (!el) return;
        el.innerHTML = '<span class="' + (cssClass || "status-pending") + '">' + C.escapeHtml(text || "") + '</span>';
      }

      function summarizeApiEvent(event) {
        if (!event) return "None";
        const raw = C.safeString(event.message);
        const methodMatch = raw.match(/\b(GET|POST|PUT|PATCH|DELETE)\b/i);
        const httpMatch = raw.match(/HTTP\s+(\d{3})/i);
        const urlMatch = raw.match(/https?:\/\/[^\s]+/i);
        let path = "API request";
        if (urlMatch) {
          try {
            const parsed = new URL(urlMatch[0]);
            path = parsed.pathname;
          } catch (_) {
            path = urlMatch[0];
          }
        }
        if (path.length > 44) path = path.slice(0, 41) + "...";
        return [methodMatch ? methodMatch[1].toUpperCase() : "API", path, httpMatch ? "HTTP " + httpMatch[1] : ""].filter(Boolean).join(" - ");
      }

      function renderRuntimeHealth() {
        const health = getRecentHealth();
        if (health.lastApi) {
          const apiText = summarizeApiEvent(health.lastApi);
          const failed = C.safeString(health.lastApi.step).toUpperCase() === "FETCH_FAILED" || C.safeString(health.lastApi.level).toUpperCase() === "ERROR";
          setPlainStatusLine("lineLastApi", apiText, failed ? "status-fail" : "status-ok");
        } else {
          setPlainStatusLine("lineLastApi", "None", "status-pending");
        }

        if (health.lastError) {
          let errorText = C.safeString(health.lastError.message || "Error");
          if (errorText.length > 72) errorText = errorText.slice(0, 69) + "...";
          setPlainStatusLine("lineLastError", errorText, "status-fail");
        } else {
          setPlainStatusLine("lineLastError", "None", "status-ok");
        }
      }

      function shortId(value) {
        const text = C.safeString(value);
        if (!text) return "Not available";
        return text.length > 16 ? text.slice(0, 8) + "..." + text.slice(-6) : text;
      }

      function getCommunicationArrays(participant) {
        if (!participant) return [];
        return [participant.messages, participant.message, participant.communications, participant.chats]
          .filter(Array.isArray)
          .reduce(function (all, items) { return all.concat(items); }, []);
      }

      function pickBestCommunication(participant) {
        const items = getCommunicationArrays(participant).filter(function (item) {
          return item && C.safeString(item.type).toLowerCase() === "webmessaging";
        });
        if (!items.length) return null;
        return items.find(function (item) { return ["connected", "alerting", "dialing"].includes(C.safeString(item.state).toLowerCase()); })
          || items.slice().sort(function (a, b) {
            return new Date(b.connectedTime || b.startTime || 0) - new Date(a.connectedTime || a.startTime || 0);
          })[0];
      }

      function resolveCustomerSession(customerParticipant, customerCommunication) {
        return C.safeString(customerCommunication && customerCommunication.journeyContext && customerCommunication.journeyContext.customerSession && customerCommunication.journeyContext.customerSession.id)
          || C.safeString(customerParticipant && customerParticipant.attributes && customerParticipant.attributes.AFT_GCB_SessionKey)
          || C.safeString(customerParticipant && customerParticipant.attributes && customerParticipant.attributes.sessionID);
      }

      async function loadInteractionSupportContext(token, user) {
        if (!CURRENT_CONVERSATION_ID) return;
        try {
          const conversation = await Api.getMessageConversation(token, CURRENT_CONVERSATION_ID);
          const participants = Array.isArray(conversation && conversation.participants) ? conversation.participants : [];
          const customerParticipant = participants.find(function (p) {
            return ["customer", "external"].includes(C.safeString(p && p.purpose).toLowerCase());
          }) || null;
          const agentParticipant = participants.find(function (p) {
            return C.safeString(p && p.purpose).toLowerCase() === "agent" && C.safeString(p && p.userId) === C.safeString(user && user.id);
          }) || participants.filter(function (p) { return C.safeString(p && p.purpose).toLowerCase() === "agent"; })
            .sort(function (a, b) { return new Date(b.connectedTime || 0) - new Date(a.connectedTime || 0); })[0] || null;
          const customerCommunication = pickBestCommunication(customerParticipant);
          const agentCommunication = pickBestCommunication(agentParticipant);
          const customerAttrs = customerParticipant && customerParticipant.attributes ? customerParticipant.attributes : {};
          const configOk = REQUIRED_GCB_ATTRIBUTES.filter(function (name) { return C.safeString(customerAttrs[name]).trim() !== ""; }).length;
          const configMissing = REQUIRED_GCB_ATTRIBUTES.length - configOk;
          const agentState = C.safeString(agentCommunication && agentCommunication.state).toLowerCase();
          const customerState = C.safeString(customerCommunication && customerCommunication.state).toLowerCase();
          const runtime = getRuntimeParameters();
          const runtimeAgentCommunicationId = C.safeString(runtime.agentCommunicationId);
          const resolvedAgentCommunicationId = C.safeString(agentCommunication && agentCommunication.id);
          interactionSupportContext = {
            loaded: true,
            conversationStatus: (agentState === "connected" && customerState === "connected") ? "Connected" : (conversation && conversation.endTime ? "Disconnected" : "Active / awaiting connected leg"),
            customerSessionId: resolveCustomerSession(customerParticipant, customerCommunication),
            agentParticipantId: C.safeString(runtime.agentParticipantId) || C.safeString(agentParticipant && agentParticipant.id),
            agentCommunicationId: runtimeAgentCommunicationId || resolvedAgentCommunicationId,
            communicationState: C.safeString(agentCommunication && agentCommunication.state) || (runtimeAgentCommunicationId ? "Provided by Agent Script" : "Missing"),
            participantConfigSummary: configOk + "/" + REQUIRED_GCB_ATTRIBUTES.length + " OK" + (configMissing ? " - Missing: " + configMissing : "")
          };
          debugLog("INFO", "INDEX_INTERACTION_CONTEXT_READY", "conversationId=" + CURRENT_CONVERSATION_ID + " | agentCommunicationId=" + interactionSupportContext.agentCommunicationId + " | customerSessionId=" + interactionSupportContext.customerSessionId);
          publishInteractionContext();
        } catch (error) {
          interactionSupportContext = Object.assign({}, interactionSupportContext, { loaded: false, conversationStatus: "Unable to load" });
          debugLog("WARN", "INDEX_INTERACTION_CONTEXT_FAILED", error && error.message ? error.message : String(error));
        }
      }


      function publishInteractionContext() {
        if (!CURRENT_CONVERSATION_ID) return;
        try {
          const raw = localStorage.getItem(GCB_INTERACTION_CONTEXTS_KEY);
          const map = raw ? JSON.parse(raw) : {};
          const safeMap = map && typeof map === "object" && !Array.isArray(map) ? map : {};
          safeMap[CURRENT_CONVERSATION_ID] = {
            conversationId: CURRENT_CONVERSATION_ID,
            agentParticipantId: interactionSupportContext.agentParticipantId || "",
            agentCommunicationId: interactionSupportContext.agentCommunicationId || "",
            customerSessionId: interactionSupportContext.customerSessionId || "",
            communicationState: interactionSupportContext.communicationState || "",
            updatedAt: new Date().toISOString(),
            source: "index.html"
          };
          const entries = Object.values(safeMap).sort(function(a,b){
            return new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0);
          }).slice(0, 20);
          const trimmed = {};
          entries.forEach(function(item){ if(item && item.conversationId) trimmed[item.conversationId] = item; });
          localStorage.setItem(GCB_INTERACTION_CONTEXTS_KEY, JSON.stringify(trimmed));
          debugLog("INFO", "INDEX_INTERACTION_CONTEXT_PUBLISHED", "conversationId=" + CURRENT_CONVERSATION_ID);
        } catch (error) {
          debugLog("WARN", "INDEX_INTERACTION_CONTEXT_PUBLISH_FAILED", error && error.message ? error.message : String(error));
        }
      }

      function deriveUserRole(user) {
        const roles = [];
        try {
          const authRoles = user && user.authorization && user.authorization.roles;
          if (Array.isArray(authRoles)) authRoles.forEach(function (role) { roles.push(C.safeString(role && (role.name || role))); });
          const userRoles = user && user.roles;
          if (Array.isArray(userRoles)) userRoles.forEach(function (role) { roles.push(C.safeString(role && (role.name || role))); });
        } catch (_) {}
        const cleaned = Array.from(new Set(roles.filter(Boolean)));
        if (cleaned.some(function (name) { return /supervisor/i.test(name); })) return "Supervisor role assigned";
        if (cleaned.length) return cleaned.join(", ");
        return "User";
      }

      function buildIndexDiagnosticReport() {
        const runtime = getRuntimeParameters();
        const statuses = window.GcbDebug ? window.GcbDebug.getStatuses() : {};
        const events = window.GcbDebug ? window.GcbDebug.getEvents() : [];
        const health = getRecentHealth();
        const lines = [
          "AFT GCB Index Support Diagnostic Report",
          "GCB Version: " + ROUTER_VERSION,
          "Exported: " + new Date().toISOString(),
          "Page: " + (window.location.pathname.split("/").pop() || "index.html"),
          "Source: " + C.safeString(new URLSearchParams(window.location.search || "").get("source") || "Not provided"),
          "Region: " + Auth.getRegion(),
          "Target Environment: " + C.safeString(new URLSearchParams(window.location.search || "").get("gcTargetEnv") || "Not provided"),
          "OAuth Status: " + statusText(statuses.oauth, "Pending"),
          "Token Available: " + (Auth.getAccessToken() ? "Yes" : "No"),
          "Hold / Resume Status: " + statusText(statuses.holdResume, "Not run"),
          "Prospects Status: " + statusText(statuses.prospects, "Not run"),
          "Conversation ID: " + (runtime.conversationId || "Missing"),
          "Conversation Status: " + interactionSupportContext.conversationStatus,
          "Customer Session ID: " + (interactionSupportContext.customerSessionId || "Not available"),
          "Agent Participant ID: " + (interactionSupportContext.agentParticipantId || runtime.agentParticipantId || "Not available"),
          "Agent Communication ID: " + (interactionSupportContext.agentCommunicationId || runtime.agentCommunicationId || "Not available"),
          "Communication State: " + interactionSupportContext.communicationState,
          "Participant Config: " + interactionSupportContext.participantConfigSummary,
          "Last API: " + (health.lastApi ? [health.lastApi.time, health.lastApi.message].filter(Boolean).join(" - ") : "None"),
          "Last Error: " + (health.lastError ? [health.lastError.time, health.lastError.message].filter(Boolean).join(" - ") : "None"),
          "",
          "Security Note: OAuth tokens, authorization codes, PKCE verifiers, client secrets, and customer personal/banking data are excluded.",
          "=== Recent Index Logs ==="
        ];
        events.slice(-120).forEach(function (event) { lines.push(formatEvent(event)); });
        return lines.join("\n");
      }

      function renderStatusLines() {
        const statuses = window.GcbDebug ? window.GcbDebug.getStatuses() : {};
        const issues = validateCurrentUrl();
        setLine("lineOauth", statuses.oauth, "Pending");
        setLine("lineHoldResume", statuses.holdResume, "Not run");
        setLine("lineProspects", statuses.prospects, "Not run");
        renderRuntimeHealth();
        if (issues.length) {
          setStatus("URL issue detected: " + issues.join(" | "), "error");
        }
      }

      function renderMeta(user) {
        const meta = $("gcbMeta");
        if (!meta) return;
        const params = new URLSearchParams(window.location.search || "");
        meta.innerHTML = "";
        const rows = [
          ["Conversation Status", interactionSupportContext.conversationStatus],
          ["Customer Session", shortId(interactionSupportContext.customerSessionId)],
          ["Agent Participant", shortId(interactionSupportContext.agentParticipantId)],
          ["Agent Communication", shortId(interactionSupportContext.agentCommunicationId)],
          ["Communication State", interactionSupportContext.communicationState],
          ["Participant Config", interactionSupportContext.participantConfigSummary],
          ["Build", ROUTER_VERSION],
          ["Region", Auth.getRegion()],
          ["Environment", params.get("gcTargetEnv") || "Not provided"],
          ["Client", mask(Auth.getClientId())],
          ["Conversation", mask(params.get("conversationId") || params.get("gcConversationId"))],
          ["Page", params.get("page") || params.get("module") || "None"]
        ];
        if (user) {
          rows.push(["User", C.safeString(user.name || user.email || user.id) || "Validated"]);
          rows.push(["User ID", mask(user.id)]);
        }
        rows.forEach(function (r) {
          const k = document.createElement("b"); k.textContent = r[0];
          const v = document.createElement("div"); v.textContent = r[1] || "Not provided";
          meta.appendChild(k); meta.appendChild(v);
        });
      }

      function formatEvent(e) {
        return [e.time, e.level, e.module, e.step, e.message, e.data || ""].filter(Boolean).join(" | ");
      }

      function renderCentralLogs() {
        const el = $("centralDebugLog");
        if (!el) return;
        const events = window.GcbDebug ? window.GcbDebug.getEvents().slice(-120).reverse() : [];
        el.textContent = events.length ? events.map(formatEvent).join("\n") : "No logs yet.";
        renderStatusLines();
      }


      function legacyCopyText(text) {
        try {
          const area = document.createElement("textarea");
          area.value = text;
          area.setAttribute("readonly", "readonly");
          area.style.position = "fixed";
          area.style.opacity = "0";
          document.body.appendChild(area);
          area.select();
          const ok = document.execCommand && document.execCommand("copy");
          area.remove();
          return !!ok;
        } catch (_) { return false; }
      }

      function setupButtons() {
        const refresh = $("refreshLogsBtn");
        const clear = $("clearLogsBtn");
        const copy = $("copyLogsBtn");
        const download = $("downloadLogsBtn");
        const toggle = $("toggleLogsBtn");
        const logBox = $("centralDebugLog");
        function downloadCentralDetails() {
          const text = buildIndexDiagnosticReport();
          const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          const ts = new Date().toISOString().replace(/[:.]/g, "-");
          a.href = url;
          a.download = "AFT_GCB_Index_Details_" + ts + ".txt";
          a.style.display = "none";
          document.body.appendChild(a);
          try {
            a.click();
            setStatus("Debug details download requested.", "success");
          } catch (error) {
            const opened = window.open(url, "_blank", "noopener");
            if (opened) setStatus("Download opened in a new tab. Save the text file from there.", "warning");
            else {
              const logBox = $("centralDebugLog");
              if (logBox) { logBox.textContent = text; logBox.classList.add("show"); }
              setStatus("Browser blocked the download. Details are shown below for manual save.", "warning");
            }
          }
          setTimeout(function () { URL.revokeObjectURL(url); a.remove(); }, 30000);
        }
        if (refresh) refresh.onclick = renderCentralLogs;
        if (clear) clear.onclick = function () { if (window.GcbDebug) window.GcbDebug.clear(); renderCentralLogs(); };
        if (download) download.onclick = downloadCentralDetails;
        if (copy) copy.onclick = async function () {
          const text = buildIndexDiagnosticReport();
          try {
            await navigator.clipboard.writeText(text);
            setStatus("Debug details copied.", "success");
          } catch (_) {
            if (legacyCopyText(text)) setStatus("Debug details copied using browser fallback.", "success");
            else setStatus("Clipboard is unavailable in the Genesys frame. Use Download details.", "warning");
          }
        };
        if (toggle && logBox) toggle.onclick = function () {
          logBox.classList.toggle("show");
          toggle.textContent = logBox.classList.contains("show") ? "Hide details" : "Show details";
        };
        window.addEventListener("gcb-debug-event", renderCentralLogs);
        window.addEventListener("gcb-status-event", renderStatusLines);
        setInterval(renderCentralLogs, 5000);
      }

      function getModuleName() { return C.safeString(C.getParam("page") || C.getParam("module")).toLowerCase(); }

      function buildTargetUrl(moduleFile) {
        const params = new URLSearchParams(window.location.search || "");
        params.delete("code");
        params.delete("state");
        params.delete("page");
        params.delete("module");
        params.set("routedFrom", "index");
        const query = params.toString();
        return moduleFile + (query ? "?" + query : "");
      }

      async function loadModule(moduleName) {
        const moduleFile = MODULE_MAP[moduleName];
        if (!moduleFile) throw new Error("Invalid GCB page/module: " + moduleName);
        const targetUrl = buildTargetUrl(moduleFile);
        setStatus("OAuth success. Opening " + moduleName + "...", "success");
        debugLog("INFO", "ROUTE_TO_PAGE", moduleName + " -> " + targetUrl);
        window.location.replace(targetUrl);
      }

      async function start() {
        setupButtons();
        renderMeta(null);
        renderCentralLogs();
        publishRuntimeConfiguration();
        setStatus("Checking OAuth / MFA...", "warning");

        if (await Auth.handleOAuthRedirectIfPresent()) return;

        const token = await Auth.ensureToken();
        if (!token) return;

        let user = null;
        try {
          user = await Api.getCurrentUser(token);
          if (window.GcbDebug) window.GcbDebug.setStatus("oauth", "success", "OAuth completed and Genesys access validated.");
        } catch (error) {
          if (window.GcbDebug) window.GcbDebug.setStatus("oauth", "failed", error && error.message ? error.message : String(error));
          if (Auth.isAuthError(error)) {
            Auth.clearToken();
            await Auth.startPKCELogin({ restoreUrl: window.location.href });
            return;
          }
          throw error;
        }

        await loadInteractionSupportContext(token, user);
        renderMeta(user);
        if (window.GcbDebug) window.GcbDebug.setStatus("holdResume", "pending", "Waiting for Hold/Resume action.");
        renderStatusLines();
        startCentralHoldMonitor();
        const moduleName = getModuleName();
        if (!moduleName) {
          setStatus("GCB Ready. OAuth success. No business page selected.", "success");
          debugLog("INFO", "LANDING_READY", "Index status page loaded. No business page selected.");
          return;
        }
        await loadModule(moduleName);
      }

      start().catch(function (error) {
        const msg = error && (error.stack || error.message) ? (error.stack || error.message) : String(error);
        debugLog("ERROR", "INDEX_INIT_FAILED", msg);
        setStatus("GCB failed: " + (error && error.message ? error.message : String(error)), "error");
        renderStatusLines();
      });
    })();
  </script>
</body>
</html>
